<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="heading">Image Gallery</h1>

    <div class="grid">


        <img src="https://images.pexels.com/photos/1203161/pexels-photo-1203161.png" alt="image" class="image"/>
        <img src="https://images.pexels.com/photos/1037992/pexels-photo-1037992.jpeg?w=1260&h=750&dpr=2" alt="image" class="image"/>
        <img src="https://images.pexels.com/photos/1210622/pexels-photo-1210622.jpeg?w=1260&h=750&dpr=2" alt="image" class="image"/>
        <img src="https://images.pexels.com/photos/33253286/pexels-photo-33253286/free-photo-of-luxury-car-on-road-against-urban-backdrop.jpeg" alt="image" class="image"/>
        <img src="https://images.pexels.com/photos/7283176/pexels-photo-7283176.jpeg?w=1260&h=750&dpr=2" alt="image" class="image"/>
        <img src="https://images.pexels.com/photos/20339651/pexels-photo-20339651/free-photo-of-black-and-white-photo-of-a-tail-of-a-whale-above-the-water.jpeg?w=1260&h=750&dpr=2" alt="image" class="image"/>
        <img src="https://images.pexels.com/photos/29159501/pexels-photo-29159501/free-photo-of-serene-forest-picnic-area-in-sunlight.jpeg" alt="image" class="image"/>
        <img src="https://images.pexels.com/photos/32162192/pexels-photo-32162192/free-photo-of-charming-european-robin-perched-on-tree-branch-in-spring.jpeg" alt="image" class="image"/>
        
        
    </div>

    <div class="ZoomIn">
        <div class="cross">x</div>
        <button class="swapBtn btn1"><</button>
        <button class="swapBtn btn2">></button>
    </div>

    <script src="script.js"></script>
</body>
</html>
